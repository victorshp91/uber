<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banners Victor Saint-Hilaire</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');

        body {
            background-color: #f0f0f0;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
            padding: 40px;
            margin: 0;
        }

        /* Estilo base para los banners */
        .banner {
            background-color: #121212;
            color: #ffffff;
            width: 800px;
            height: 450px; /* Proporción panorámica ideal para el respaldo del asiento */
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            overflow: hidden;
            position: relative;
            box-sizing: border-box;
        }

        .qr-placeholder {
            width: 160px;
            height: 160px;
            background-color: #ffffff;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #121212;
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 30px;
            border: 4px solid #333;
        }

        .qr-placeholder img {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* BANNERS: ESTILO SERVICIO DIVIDIDO */
        .banner-en,
        .banner-es {
            display: flex;
            padding: 50px;
            justify-content: space-between;
            align-items: center;
            text-align: left;
        }

        .banner-en .left-col,
        .banner-es .left-col {
            flex: 1;
            padding-right: 40px;
        }

        .banner-en .right-col,
        .banner-es .right-col {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(255,255,255,0.05);
            padding: 30px;
            border-radius: 15px;
        }

        .banner-en .driver-info,
        .banner-es .driver-info {
            display: flex;
            align-items: center;
            gap: 18px;
            margin-bottom: 40px;
        }

        .avatar-wrap {
            width: 86px;
            height: 86px;
            flex: 0 0 86px;
            padding: 4px;
            border-radius: 999px;
            background: linear-gradient(135deg, #6ee7b7, #93c5fd);
            box-shadow: 0 14px 32px rgba(110, 231, 183, 0.16);
        }

        .avatar {
            width: 100%;
            height: 100%;
            display: block;
            border: 4px solid #121212;
            border-radius: inherit;
            object-fit: cover;
        }

        .banner-en .driver-name,
        .banner-es .driver-name {
            font-size: 24px;
            font-weight: 700;
            color: #a0a0a0;
            margin: 0;
        }

        .banner-en .main-question,
        .banner-es .main-question {
            font-size: 48px;
            font-weight: 900;
            line-height: 1.1;
            margin: 0 0 20px 0;
        }

        .banner-en .sub-question,
        .banner-es .sub-question {
            font-size: 20px;
            font-weight: 300;
            color: #a0a0a0;
            margin: 0;
        }

        .banner-en .qr-instruction,
        .banner-es .qr-instruction {
            font-size: 16px;
            font-weight: 700;
            margin-top: 20px;
            letter-spacing: 1px;
        }

        /* Detalles decorativos */
        .accent-line {
            width: 60px;
            height: 4px;
            background-color: #ffffff;
            margin: 0 auto 30px auto;
        }
        
        .banner-en .accent-line,
        .banner-es .accent-line {
            margin: 20px 0;
        }
    </style>
</head>
<body>

    <!-- OPCIÓN 1: ESPAÑOL -->
    <div class="banner banner-es">
        <div class="left-col">
            <div class="driver-info">
                <div class="avatar-wrap" aria-hidden="true">
                    <img
                        class="avatar"
                        src="1.jpeg"
                        alt=""
                    >
                </div>
                <p class="driver-name">VICTOR SAINT-HILAIRE</p>
            </div>
            
            <h2 class="main-question">¿NECESITAS<br>UN VIAJE PRIVADO?</h2>
            <div class="accent-line"></div>
            <p class="sub-question">O quieres dejar una propina...<br>Guarda mi contacto directo en tu teléfono.</p>
        </div>
        
        <div class="right-col">
            <div class="qr-placeholder" style="margin-bottom: 0;">
                <img src="qr-victor.svg" alt="QR code para abrir la tarjeta digital">
            </div>
            <p class="qr-instruction">ESCANEA AQUÍ</p>
        </div>
    </div>

    <!-- OPCIÓN 2: INGLÉS -->
    <div class="banner banner-en">
        <div class="left-col">
            <div class="driver-info">
                <div class="avatar-wrap" aria-hidden="true">
                    <img
                        class="avatar"
                        src="1.jpeg"
                        alt=""
                    >
                </div>
                <p class="driver-name">VICTOR SAINT-HILAIRE</p>
            </div>
            
            <h2 class="main-question">NEED A<br>PRIVATE RIDE?</h2>
            <div class="accent-line"></div>
            <p class="sub-question">Or want to leave a tip...<br>Save my direct contact on your phone.</p>
        </div>
        
        <div class="right-col">
            <div class="qr-placeholder" style="margin-bottom: 0;">
                <img src="qr-victor.svg" alt="QR code to open the digital card">
            </div>
            <p class="qr-instruction">SCAN HERE</p>
        </div>
    </div>

</body>
</html>
